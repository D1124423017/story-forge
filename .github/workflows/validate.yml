name: Validate Story Forge

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "SKILL.md"
      - "agents/**"
      - "references/**"
      - "scripts/**"
      - "assets/**"
      - "examples/**"
      - "docs/**"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill contract
        run: python scripts/validate_skill_contract.py --skill-dir .

      - name: Check docs JavaScript
        run: node --check docs/app.js
